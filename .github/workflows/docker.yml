name: Docker
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: lowercase the repository owner
      run: echo "owner=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
    - uses: actions/checkout@v4
    - name: Build the Docker image
      run: |
        docker build -t lute:latest -f docker/Dockerfile .
    - name: Push the Docker image to ghcr.io
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - run: |
        docker tag lute:latest ghcr.io/${{ env.owner }}/lute:latest
        docker push ghcr.io/${{ env.owner }}/lute:latest